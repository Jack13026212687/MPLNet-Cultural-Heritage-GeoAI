# MCPNet Configuration for TV-RSI-413 Dataset

model:
  name: MCPNet
  num_classes: 22
  pretrained: true

data:
  dataset: TV-RSI-413
  data_root: ./data/TV-RSI-413
  img_size: [512, 512]
  batch_size: 16
  num_workers: 4

training:
  epochs: 100
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0001
  lr_scheduler: cosine

  augmentation:
    random_flip: true
    random_rotate: true
    color_jitter: true

evaluation:
  batch_size: 32
  compute_metrics:
    - miou
    - mpa

checkpoint:
  save_dir: ./checkpoints
  monitor: val_miou
  mode: max
